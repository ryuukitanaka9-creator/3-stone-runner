<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3Stone Runner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
canvas { display: block; image-rendering: pixelated; border: 2px solid #444; }
#nameOverlay { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#1a2a1a; border:2px solid #4fa; padding:24px 32px; text-align:center; z-index:10; }
#nameOverlay p { color:#4fa; font-size:16px; margin-bottom:12px; font-family:monospace; }
#nameInput { background:#0d1b0d; color:#fff; border:1px solid #4fa; padding:6px 10px;
  font-size:16px; font-family:monospace; width:200px; outline:none; }
#nameSubmit { margin-top:10px; display:block; background:#4fa; color:#000; border:none;
  padding:6px 20px; font-size:14px; font-family:monospace; cursor:pointer; width:100%; }
#pwOverlay { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#2a1a1a; border:2px solid #f44; padding:24px 32px; text-align:center; z-index:11; }
#pwOverlay p.pwTitle { color:#f88; font-size:15px; margin-bottom:10px; font-family:monospace; }
#pwInput { background:#1b0d0d; color:#fff; border:1px solid #f44; padding:6px 10px;
  font-size:16px; font-family:monospace; width:200px; outline:none; }
#pwError { color:#f44; font-size:12px; height:18px; margin-top:4px; font-family:monospace; }
#pwButtons { margin-top:8px; display:flex; gap:8px; }
#pwOk { flex:1; background:#f44; color:#fff; border:none; padding:6px 10px; font-size:13px; font-family:monospace; cursor:pointer; }
#pwCancel { flex:1; background:#444; color:#fff; border:none; padding:6px 10px; font-size:13px; font-family:monospace; cursor:pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="nameOverlay">
  <p>名前を入力してください</p>
  <input id="nameInput" type="text" maxlength="12" placeholder="名前">
  <button id="nameSubmit">記録する</button>
</div>
<div id="pwOverlay">
  <p class="pwTitle">削除パスワードを入力</p>
  <input id="pwInput" type="password" maxlength="16" placeholder="パスワード">
  <p id="pwError"></p>
  <div id="pwButtons">
    <button id="pwOk">確認</button>
    <button id="pwCancel">キャンセル</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 400;

const GROUND = 320;
const PLAYER_H = 48;
const JUMP_VY = -15;
const TA_GOAL = 1000;

let keys = {}, prevKeys = {};
let state = 'modeSel';
let gameMode = 'normal';
let modeSelCursor = 0;

let distance = 0, speed = 0, baseSpeed = 7.2, boostSpeed = 7.2;
let frameCount = 0;
let playStartTime = 0, elapsedMs = 0;
let groundOffset = 0;
let obstacles = [], enemies = [], groundEnemies = [], mushrooms = [], particles = [];
let invincible = false, invincibleTimer = 0, invincibleEndTime = 0, nextMushroomDist = 480 + Math.random()*40;
const INVINCIBLE_DURATION_MS = 3000;
let spawnBaseInterval = 68, nextSpawnIn = 68, spawnTimer = 0;
let enemySpawnBaseInterval = 280, enemyNextSpawnIn = 280, enemySpawnTimer = 0;
let gEnemySpawnBaseInterval = 280, gEnemyNextSpawnIn = 280, gEnemySpawnTimer = 0;
let deathReason = '';
let lastTime = 0;
let timeBonusDisplay = 0;
let recordDecided = false;
let isNewBest = false;
let recCol = 0, recRow = 0;
let adminMode = false, pwMode = '', pendingDelCol = 0, pendingDelRow = 0;
let swordMode = false, homeKeyBuffer = '';

let bestTime = localStorage.getItem('axeRunnerBest') ? Number(localStorage.getItem('axeRunnerBest')) : null;
let bestDistance = localStorage.getItem('axeRunnerBestDist') ? Number(localStorage.getItem('axeRunnerBestDist')) : null;
let bestHardDistance = localStorage.getItem('axeRunnerHardBestDist') ? Number(localStorage.getItem('axeRunnerHardBestDist')) : null;
let taRecords = JSON.parse(localStorage.getItem('axeRunnerRecords') || '[]');
let normalRecords = JSON.parse(localStorage.getItem('axeRunnerNormalRecords') || '[]');
let hardRecords = JSON.parse(localStorage.getItem('axeRunnerHardRecords') || '[]');
let pendingRecordMode = '';

const LS_KEYS = ['axeRunnerNormalRecords','axeRunnerHardRecords','axeRunnerRecords'];
function syncRecords(col) {
  localStorage.setItem(LS_KEYS[col], JSON.stringify([normalRecords,hardRecords,taRecords][col]));
}

// パスワードはSHA-256ハッシュで比較（平文は保持しない）
const PW_HASH = '4f7f7c3068ae5760a3bf4df65fa2ab6da7c853cf0f9134d48072f2ec8fc8e79d';
async function hashStr(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// --- Audio ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, type, vol, dur, freqEnd) {
  try {
    const ac = getAC();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, ac.currentTime);
    if (freqEnd !== undefined) o.frequency.linearRampToValueAtTime(freqEnd, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}
function playNoise(vol, dur) {
  try {
    const ac = getAC();
    const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * dur), ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    const g = ac.createGain();
    src.buffer = buf; src.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    src.start(); src.stop(ac.currentTime + dur);
  } catch(e) {}
}
function sndJump()     { playTone(220, 'square', 0.07, 0.13, 440); }
function sndChop()     { playNoise(0.06, 0.08); playTone(140, 'sawtooth', 0.05, 0.09, 70); }
function sndBreak()    { playNoise(0.13, 0.18); playTone(90, 'square', 0.07, 0.12, 40); }
function sndKill()     {
  playTone(440, 'square', 0.08, 0.08);
  setTimeout(() => playTone(330, 'square', 0.07, 0.09), 80);
  setTimeout(() => playTone(220, 'square', 0.06, 0.14), 160);
}
function sndPickup()   { [400,530,660,880].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.06,0.09), i*45)); }
function sndGameOver() { [280,230,180,140,100].forEach((f,i) => setTimeout(() => playTone(f,'square',0.09,0.22), i*110)); }
function sndGoal()     { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,'square',0.09,0.24), i*130)); }
function sndTimeBonus(){ [660,880,1100].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.05,0.09), i*55)); }
function sndStomp()    { playTone(160, 'square', 0.09, 0.12, 60); }

// --- BGM ---
let bgmTimer = null, bgmBeat = 0;
const BGM_MS = 187; // ~160 BPM 8th notes
const bgmBass    = [65.41,0,65.41,0,73.42,0,73.42,0, 77.78,0,77.78,0,65.41,0,65.41,0];
const bgmMelody  = [261.63,0,329.63,0,392,329.63,0,261.63, 293.66,0,369.99,0,440,369.99,0,293.66];
function bgmTick() {
  const b = bgmBass[bgmBeat % bgmBass.length];
  const m = bgmMelody[bgmBeat % bgmMelody.length];
  if (b) playTone(b, 'square', 0.035, 0.15);
  if (m) playTone(m, 'triangle', 0.025, 0.13);
  bgmBeat++;
}
function startBGM() { if (bgmTimer) return; bgmBeat = 0; bgmTimer = setInterval(bgmTick, BGM_MS); }
function stopBGM()  { if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; } }

// --- Name overlay ---
const nameOverlay = document.getElementById('nameOverlay');
const nameInput = document.getElementById('nameInput');
document.getElementById('nameSubmit').addEventListener('click', submitName);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitName(); e.stopPropagation(); });

function submitName() {
  const name = nameInput.value.trim() || '名無し';
  if (pendingRecordMode === 'rename') {
    [normalRecords, hardRecords, taRecords][pendingDelCol][pendingDelRow].name = name;
    syncRecords(pendingDelCol);
    nameOverlay.style.display = 'none';
    nameInput.value = '';
    state = 'records';
    return;
  }
  if (pendingRecordMode === 'timeattack') {
    taRecords.push({ name, ms: elapsedMs });
    taRecords.sort((a,b) => a.ms - b.ms);
    if (taRecords.length > 50) taRecords.length = 50;
    syncRecords(2);
  } else if (pendingRecordMode === 'hard') {
    hardRecords.push({ name, dist: Math.floor(distance) });
    hardRecords.sort((a,b) => b.dist - a.dist);
    if (hardRecords.length > 50) hardRecords.length = 50;
    syncRecords(1);
  } else {
    normalRecords.push({ name, dist: Math.floor(distance) });
    normalRecords.sort((a,b) => b.dist - a.dist);
    if (normalRecords.length > 50) normalRecords.length = 50;
    syncRecords(0);
  }
  nameOverlay.style.display = 'none';
  nameInput.value = '';
  if (pendingRecordMode !== 'timeattack') recordDecided = true;
  state = pendingRecordMode === 'timeattack' ? 'goal' : 'over';
}

function showNameInput(mode) {
  pendingRecordMode = mode;
  document.querySelector('#nameOverlay p').textContent = mode === 'rename' ? '名前を変更してください' : '名前を入力してください';
  state = 'nameinput';
  nameOverlay.style.display = 'block';
  setTimeout(() => nameInput.focus(), 50);
}

// --- Password overlay ---
const pwOverlay = document.getElementById('pwOverlay');
const pwInput   = document.getElementById('pwInput');
const pwError   = document.getElementById('pwError');
document.getElementById('pwOk').addEventListener('click', submitPassword);
document.getElementById('pwCancel').addEventListener('click', cancelPassword);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitPassword(); e.stopPropagation(); });

const pwTitle = document.querySelector('#pwOverlay .pwTitle');
function showPasswordInput(mode) {
  pwMode = mode;
  pwError.textContent = '';
  pwInput.value = '';
  pwTitle.textContent = mode === 'admin' ? '管理者パスワードを入力' : '削除パスワードを入力';
  pwOverlay.style.display = 'block';
  setTimeout(() => pwInput.focus(), 50);
}
async function submitPassword() {
  const h = await hashStr(pwInput.value);
  if (h === PW_HASH) {
    pwOverlay.style.display = 'none';
    pwInput.value = '';
    if (pwMode === 'deleteOne') {
      deleteSelectedRecord(pendingDelCol, pendingDelRow);
    } else if (pwMode === 'admin') {
      adminMode = true;
      recRow = 0;
    } else if (pwMode === 'deleteAll') {
      resetAllRecords();
    }
  } else {
    pwError.textContent = 'パスワードが違います';
    pwInput.value = '';
    pwInput.focus();
  }
}
function cancelPassword() {
  pwOverlay.style.display = 'none';
  pwInput.value = '';
}

function deleteSelectedRecord(col, row) {
  const list = [normalRecords, hardRecords, taRecords][col];
  if (row < list.length) {
    list.splice(row, 1);
    syncRecords(col);
    recRow = Math.max(0, Math.min(recRow, list.length - 1));
  }
}

function resetAllRecords() {
  taRecords = []; normalRecords = []; hardRecords = [];
  bestTime = null; bestDistance = null; bestHardDistance = null;
  LS_KEYS.forEach(k => localStorage.removeItem(k));
  ['axeRunnerBest','axeRunnerBestDist','axeRunnerHardBestDist'].forEach(k => localStorage.removeItem(k));
}

const layers = [
  { x: 0, spd: 0.2, objs: genStars(40) },
  { x: 0, spd: 0.5, objs: genMountains() },
  { x: 0, spd: 1.0, objs: genTrees() },
];
function genStars(n) {
  return Array.from({length:n}, () => ({ x: Math.random()*800, y: Math.random()*200, r: Math.random()*2+0.5 }));
}
function genMountains() {
  return Array.from({length:8}, (_,i) => ({ x: i*140+Math.random()*60, w: 120+Math.random()*80, h: 80+Math.random()*70 }));
}
function genTrees() {
  return Array.from({length:14}, (_,i) => ({ x: i*70+Math.random()*40, h: 50+Math.random()*40 }));
}

const player = {
  x: 110, y: GROUND, w: 32, h: PLAYER_H,
  vy: 0, onGround: true,
  animFrame: 0, animTimer: 0,
  chopping: false, chopTimer: 0, chopDuration: 16,
  jumping: false,
};

function randomInterval(base, minI, maxSpread) {
  const lo = Math.max(minI, base - 25);
  const hi = base + maxSpread;
  return lo + Math.floor(Math.random() * (hi - lo + 1));
}

function resetGame() {
  homeKeyBuffer = '';
  distance = 0; baseSpeed = 7.2; boostSpeed = 7.2; frameCount = 0;
  playStartTime = performance.now(); elapsedMs = 0; groundOffset = 0; lastTime = 0;
  obstacles = []; enemies = []; groundEnemies = []; mushrooms = []; particles = [];
  invincible = false; invincibleTimer = 0; invincibleEndTime = 0; nextMushroomDist = 480 + Math.random()*40;
  timeBonusDisplay = 0;
  recordDecided = false;
  isNewBest = false;
  recCol = 0; recRow = 0; adminMode = false;
  deathReason = '';

  if (gameMode === 'hard') {
    spawnBaseInterval = 40; nextSpawnIn = 40; spawnTimer = 0;
    enemySpawnBaseInterval = 150; enemyNextSpawnIn = 150; enemySpawnTimer = 0;
    gEnemySpawnBaseInterval = 150; gEnemyNextSpawnIn = 170; gEnemySpawnTimer = 0;
  } else {
    spawnBaseInterval = 68; nextSpawnIn = 68; spawnTimer = 0;
    enemySpawnBaseInterval = 280; enemyNextSpawnIn = 280; enemySpawnTimer = 0;
    gEnemySpawnBaseInterval = 280; gEnemyNextSpawnIn = 320; gEnemySpawnTimer = 0;
  }

  Object.assign(player, {
    y: GROUND, vy: 0, onGround: true, animFrame: 0, animTimer: 0,
    chopping: false, chopTimer: 0, jumping: false,
  });
  layers.forEach(l => l.x = 0);
}

function formatTime(ms) {
  const total = ms / 1000;
  const m = Math.floor(total / 60);
  const s = Math.floor(total % 60);
  const cs = Math.floor((total - Math.floor(total)) * 100);
  return `${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

// --- Input ---
document.addEventListener('keydown', e => {
  if (!keys[e.code]) {
    if (state === 'modeSel') {
      if (e.code === 'ArrowLeft'  || e.code === 'ArrowUp')    modeSelCursor = (modeSelCursor + 2) % 3;
      if (e.code === 'ArrowRight' || e.code === 'ArrowDown')  modeSelCursor = (modeSelCursor + 1) % 3;
      if (e.code === 'Enter') {
        gameMode = ['normal','hard','timeattack'][modeSelCursor];
        resetGame(); state = 'play'; startBGM();
      }
      if (e.code === 'KeyR') state = 'records';
      if (e.key.length === 1) {
        homeKeyBuffer = (homeKeyBuffer + e.key.toUpperCase()).slice(-6);
        if (homeKeyBuffer === '3STONE') { swordMode = true; homeKeyBuffer = ''; }
      }
    }
    if (state === 'records') {
      if (e.code === 'Escape') { adminMode = false; state = 'modeSel'; swordMode = false; }
      if (e.code === 'ArrowLeft')  { recCol = (recCol + 2) % 3; recRow = 0; }
      if (e.code === 'ArrowRight') { recCol = (recCol + 1) % 3; recRow = 0; }
      if (e.code === 'ArrowUp')   recRow = Math.max(0, recRow - 1);
      if (e.code === 'ArrowDown') {
        const list = [normalRecords, hardRecords, taRecords][recCol];
        const maxRow = adminMode ? Math.min(49, list.length - 1) : Math.min(9, list.length - 1);
        recRow = Math.min(maxRow, recRow + 1);
      }
      if (e.code === 'Delete' && adminMode) {
        const list = [normalRecords, hardRecords, taRecords][recCol];
        if (list.length > 0 && recRow < list.length) {
          pendingDelCol = recCol; pendingDelRow = recRow;
          showPasswordInput('deleteOne');
        }
      }
      if (e.code === 'KeyA' && !adminMode) showPasswordInput('admin');
      if (e.code === 'KeyA' && adminMode) adminMode = false;
      if (e.code === 'KeyE' && adminMode) {
        const list = [normalRecords, hardRecords, taRecords][recCol];
        if (list.length > 0 && recRow < list.length) {
          pendingDelCol = recCol; pendingDelRow = recRow;
          nameInput.value = list[recRow].name;
          showNameInput('rename');
        }
      }
    }
    if (state === 'over' || state === 'goal') {
      const isEndless = gameMode === 'normal' || gameMode === 'hard';
      if (state === 'over' && isEndless) {
        if (e.code === 'KeyY') {
          const curList = gameMode === 'hard' ? hardRecords : normalRecords;
          if (curList.length >= 50) { recordDecided = true; }
          else { showNameInput(gameMode); }
        }
        if (e.code === 'KeyN' && !isNewBest) { recordDecided = true; }
        if (e.code === 'Enter' && recordDecided) { resetGame(); state = 'play'; startBGM(); }
      } else {
        if (e.code === 'Enter') { resetGame(); state = 'play'; startBGM(); }
      }
      if (e.code === 'Escape') { swordMode = false; state = 'modeSel'; }
    }
    if (state === 'play') {
      if (e.code === 'Escape') { stopBGM(); swordMode = false; state = 'modeSel'; return; }
      if (e.code === 'Enter' && player.onGround) {
        player.vy = JUMP_VY; player.onGround = false; player.jumping = true;
        sndJump();
      }
      if (e.code === 'KeyS' && !player.chopping) {
        player.chopping = true; player.chopTimer = 0;
        sndChop();
      }
    }
  }
  keys[e.code] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// --- Obstacle spawn ---
function spawnObstacle() {
  const type = Math.random() < 0.5 ? 'crate' : 'stone';
  if (type === 'stone') {
    const large = Math.random() < 0.6;
    obstacles.push({ type:'stone', x:820, w:large?52:36, h:large?46:24, y:GROUND, large, alive:true, breakAnim:0 });
  } else {
    const h = 75 + Math.floor(Math.random() * 21);
    obstacles.push({ type:'crate', x:820, w:40, h, y:GROUND, alive:true, breakAnim:0 });
  }
}

// --- Mushroom spawn ---
function spawnMushroom() {
  mushrooms.push({ x: 870, y: GROUND, w: 28, h: 36, bobPhase: Math.random()*Math.PI*2 });
}

// --- Draw mushroom ---
function drawMushroom(mu) {
  const mx = mu.x, my = mu.y - mu.h + Math.sin(mu.bobPhase) * 3;
  ctx.fillStyle = '#e8d8c0'; ctx.fillRect(mx+9, my+20, 10, 16);
  ctx.fillStyle = '#7a10c0';
  ctx.beginPath(); ctx.ellipse(mx+14, my+20, 16, 12, 0, Math.PI, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#9a30e0';
  ctx.beginPath(); ctx.ellipse(mx+14, my+20, 13, 9, 0, Math.PI, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  [[mx+8, my+14],[mx+18, my+12],[mx+14, my+10]].forEach(([px,py]) => {
    ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI*2); ctx.fill();
  });
  ctx.save();
  ctx.globalAlpha = 0.25 + 0.2*Math.sin(frameCount*0.12);
  ctx.fillStyle = '#c060ff';
  ctx.beginPath(); ctx.ellipse(mx+14, my+16, 20, 16, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// --- Enemy spawn ---
function spawnEnemy() {
  const hardMult = gameMode === 'hard' ? 1.35 : 1;
  const yCenter = 155 + Math.random() * 120;
  const amp = 28 + Math.random() * 55;
  const freq = 0.022 + Math.random() * 0.028;
  enemies.push({
    x: 830, yCenter, amp, freq,
    phase: Math.random() * Math.PI * 2,
    screenY: yCenter,
    w: 52, h: 42,
    alive: true, deathAnim: 0,
    wingPhase: Math.random() * Math.PI * 2,
    speed: (1.19 + Math.random() * 0.42) * hardMult,
  });
}

// --- Ground enemy spawn ---
function spawnGroundEnemy() {
  const hardMult = gameMode === 'hard' ? 1.35 : 1;
  groundEnemies.push({
    x: 830, y: GROUND, w: 36, h: 40,
    alive: true, deathAnim: 0,
    animFrame: 0, animTimer: 0,
    speed: (1.2 + Math.random() * 0.48) * hardMult,
  });
}

// --- Draw ground enemy (goblin) ---
function drawGroundEnemy(en) {
  if (!en.alive && en.deathAnim <= 0) return;
  const ex = Math.floor(en.x);
  const ey = Math.floor(en.y - en.h);
  ctx.save();
  if (en.deathAnim > 0) {
    const t = en.deathAnim / 16;
    ctx.globalAlpha = 1 - t;
    ctx.translate(ex+18, ey+20); ctx.scale(1+t, 1-t*0.8); ctx.translate(-(ex+18), -(ey+20));
  }
  const lf = Math.sin(en.animFrame * 0.5) * 5;
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(ex+18, GROUND+2, 14, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a1a8a';
  ctx.fillRect(ex+8,  ey+28, 7, 10); ctx.fillRect(ex+Math.round(8+lf),  ey+37, 7, 4);
  ctx.fillRect(ex+19, ey+28, 7, 10); ctx.fillRect(ex+Math.round(19-lf), ey+37, 7, 4);
  ctx.fillStyle = '#3a0a6a';
  ctx.fillRect(ex+Math.round(6+lf),  ey+40, 9, 4);
  ctx.fillRect(ex+Math.round(17-lf), ey+40, 9, 4);
  ctx.fillStyle = '#7a1a9a';
  ctx.fillRect(ex+7, ey+14, 22, 16);
  ctx.fillStyle = '#7a1a9a';
  ctx.fillRect(ex+1,  ey+15, 7, 8);
  ctx.fillRect(ex+28, ey+15, 7, 8);
  ctx.fillStyle = '#8a20aa';
  ctx.fillRect(ex+9, ey+2, 18, 14);
  ctx.fillRect(ex+6,  ey+4, 4, 6);
  ctx.fillRect(ex+26, ey+4, 4, 6);
  ctx.fillStyle = '#f00';
  ctx.fillRect(ex+12, ey+6, 4, 4);
  ctx.fillRect(ex+20, ey+6, 4, 4);
  ctx.fillStyle = '#fff';
  ctx.fillRect(ex+13, ey+7, 2, 2);
  ctx.fillRect(ex+21, ey+7, 2, 2);
  ctx.fillStyle = '#eee';
  ctx.fillRect(ex+13, ey+14, 3, 4);
  ctx.fillRect(ex+20, ey+14, 3, 4);
  ctx.restore();
}

// --- Particles ---
function spawnParticles(x, y, colors, n, spread=7) {
  for (let i = 0; i < n; i++) {
    const color = Array.isArray(colors) ? colors[i % colors.length] : colors;
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*spread, vy: Math.random()*-spread - 1,
      life: 40, maxLife: 40,
      color, size: 3+Math.random()*5,
      rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.3,
    });
  }
}

// --- Draw player ---
function drawPlayer() {
  const px = Math.floor(player.x);
  const py = Math.floor(player.y - player.h);
  const fr = player.animFrame;
  const chopping = player.chopping;
  const ct = player.chopTimer;
  const jumping = player.jumping;

  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(px+16, GROUND+2, 14, 4, 0, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#e8a87c'; ctx.fillRect(px+10, py+2, 12, 10);
  ctx.fillStyle = '#5c3317'; ctx.fillRect(px+10, py+2, 12, 4); ctx.fillRect(px+8, py+2, 4, 8);
  ctx.fillStyle = '#222'; ctx.fillRect(px+17, py+6, 2, 2);

  ctx.fillStyle = '#5b3a8e'; ctx.fillRect(px+8, py+12, 16, 14);
  ctx.fillStyle = '#8B4513'; ctx.fillRect(px+8, py+24, 16, 3);

  if (!jumping) {
    const ls = Math.sin(fr * 0.55) * 5;
    ctx.fillStyle = '#3a2a6e';
    ctx.fillRect(px+8, py+27, 7, 10); ctx.fillRect(px+Math.round(8+ls), py+37, 7, 4);
    ctx.fillRect(px+17, py+27, 7, 10); ctx.fillRect(px+Math.round(17-ls), py+37, 7, 4);
    ctx.fillStyle = '#3a1a00';
    ctx.fillRect(px+Math.round(6+ls), py+40, 10, 5); ctx.fillRect(px+Math.round(15-ls), py+40, 10, 5);
  } else {
    ctx.fillStyle = '#3a2a6e';
    ctx.fillRect(px+6, py+27, 8, 10); ctx.fillRect(px+18, py+27, 8, 10);
    ctx.fillStyle = '#3a1a00';
    ctx.fillRect(px+4, py+36, 10, 5); ctx.fillRect(px+18, py+36, 10, 5);
  }

  ctx.fillStyle = '#e8a87c'; ctx.fillRect(px+4, py+13, 5, 9);

  const chopPhase = chopping ? ct / player.chopDuration : 0;
  const armAngle = chopping
    ? -0.5 + chopPhase * Math.PI * 2
    : -0.1 + Math.sin(fr * 0.55) * 0.1;

  ctx.save();
  ctx.translate(px+22, py+16);
  ctx.rotate(armAngle);
  ctx.fillStyle = '#e8a87c'; ctx.fillRect(0, -3, 8, 5);
  if (swordMode) {
    ctx.fillStyle = '#8B4513'; ctx.fillRect(6, -2, 16, 4);
    ctx.fillStyle = '#aaa'; ctx.fillRect(20, -7, 3, 14);
    ctx.fillStyle = '#ccd8ff';
    ctx.beginPath(); ctx.moveTo(22,-3); ctx.lineTo(55,-1); ctx.lineTo(57,0); ctx.lineTo(55,1); ctx.lineTo(22,3); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#eef'; ctx.fillRect(23,-1,32,2);
    if (chopping) {
      ctx.save();
      ctx.globalAlpha = 0.7 * Math.sin(chopPhase * Math.PI);
      ctx.shadowColor = '#88aaff'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#aaccff';
      ctx.beginPath(); ctx.arc(57, 0, 9, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  } else {
    ctx.fillStyle = '#8B4513'; ctx.fillRect(6, -2, 20, 4);
    ctx.fillStyle = '#777'; ctx.fillRect(24, -13, 16, 26);
    ctx.fillStyle = '#999'; ctx.fillRect(25, -12, 6, 24);
    ctx.fillStyle = '#555'; ctx.fillRect(24, -13, 16, 3); ctx.fillRect(24, 10, 16, 3);
    ctx.fillStyle = '#888'; ctx.fillRect(38, -10, 3, 20);
    if (chopping) {
      ctx.fillStyle = `rgba(255,200,50,${0.75 * Math.sin(chopPhase*Math.PI)})`;
      ctx.fillRect(38, -14, 5, 28);
    }
  }
  ctx.restore();

  if (chopping && chopPhase > 0.1 && chopPhase < 0.9) {
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px+60, py+16, 28, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// --- Draw crate ---
function drawCrate(ob) {
  if (!ob.alive && ob.breakAnim <= 0) return;
  const bx = ob.x, by = ob.y - ob.h, bw = ob.w, bh = ob.h;
  ctx.save();
  if (ob.breakAnim > 0) {
    const t = ob.breakAnim / 14;
    ctx.globalAlpha = 1 - t;
    ctx.translate(bx+bw/2, by+bh/2); ctx.rotate(t * 0.9);
    ctx.scale(1+t*0.5, 1-t*0.3); ctx.translate(-(bx+bw/2), -(by+bh/2));
  }
  ctx.fillStyle = '#6a4810'; ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#4a3008'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, bw, bh);
  ctx.strokeStyle = '#4a3008'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(bx+10, by); ctx.lineTo(bx+10, by+bh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+bw-10, by); ctx.lineTo(bx+bw-10, by+bh); ctx.stroke();
  const bands = Math.max(2, Math.floor(bh / 28));
  for (let b = 1; b < bands; b++) {
    const gy = by + b * (bh / bands);
    ctx.beginPath(); ctx.moveTo(bx, gy); ctx.lineTo(bx+bw, gy); ctx.stroke();
  }
  ctx.fillStyle = '#888';
  [[bx+4,by+4],[bx+bw-7,by+4],[bx+4,by+bh-7],[bx+bw-7,by+bh-7]].forEach(([nx,ny]) => ctx.fillRect(nx, ny, 3, 3));
  ctx.fillStyle = '#cc8020'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('HEAVY', bx+bw/2, by+bh*0.52);
  ctx.textAlign = 'left';
  ctx.restore();
}

// --- Draw stone ---
function drawStone(ob) {
  if (!ob.alive && ob.breakAnim <= 0) return;
  const sx = ob.x, sy = ob.y - ob.h, sw = ob.w, sh = ob.h;
  ctx.save();
  if (ob.breakAnim > 0) {
    const t = ob.breakAnim / 14;
    ctx.globalAlpha = 1 - t;
    ctx.translate(sx+sw/2, sy+sh/2); ctx.scale(1+t*0.4, 1+t*0.4); ctx.translate(-(sx+sw/2), -(sy+sh/2));
  }
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(sx+sw/2, sy+sh+2, sw/2+2, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = ob.large ? '#666' : '#888';
  ctx.beginPath();
  if (ob.large) {
    ctx.moveTo(sx+sw*0.12, sy+sh); ctx.lineTo(sx, sy+sh*0.55); ctx.lineTo(sx+sw*0.08, sy+sh*0.15);
    ctx.lineTo(sx+sw*0.3, sy); ctx.lineTo(sx+sw*0.7, sy+sh*0.02); ctx.lineTo(sx+sw, sy+sh*0.25);
    ctx.lineTo(sx+sw*0.92, sy+sh);
  } else {
    ctx.moveTo(sx+8, sy+sh); ctx.lineTo(sx, sy+sh*0.6); ctx.lineTo(sx+sw*0.15, sy+sh*0.1);
    ctx.lineTo(sx+sw*0.5, sy); ctx.lineTo(sx+sw*0.85, sy+sh*0.15); ctx.lineTo(sx+sw, sy+sh*0.55);
    ctx.lineTo(sx+sw-5, sy+sh);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = ob.large ? '#999' : '#aaa';
  ctx.beginPath();
  ctx.moveTo(sx+sw*0.2, sy+sh*0.12); ctx.lineTo(sx+sw*0.55, sy+sh*0.04);
  ctx.lineTo(sx+sw*0.65, sy+sh*0.38); ctx.lineTo(sx+sw*0.28, sy+sh*0.46);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = ob.large ? '#444' : '#555'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx+sw*0.42, sy+sh*0.18); ctx.lineTo(sx+sw*0.5, sy+sh*0.52); ctx.lineTo(sx+sw*0.46, sy+sh*0.82); ctx.stroke();
  if (ob.large) {
    ctx.strokeStyle = 'rgba(255,100,50,0.35)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx+sw*0.12, sy+sh); ctx.lineTo(sx, sy+sh*0.55); ctx.lineTo(sx+sw*0.08, sy+sh*0.15);
    ctx.lineTo(sx+sw*0.3, sy); ctx.lineTo(sx+sw*0.7, sy+sh*0.02); ctx.lineTo(sx+sw, sy+sh*0.25);
    ctx.lineTo(sx+sw*0.92, sy+sh); ctx.closePath(); ctx.stroke();
  }
  ctx.restore();
}

// --- Draw enemy ---
function drawEnemy(en) {
  if (!en.alive && en.deathAnim <= 0) return;
  const ex = Math.floor(en.x);
  const ey = Math.floor(en.screenY);
  const wp = en.wingPhase;

  ctx.save();
  if (en.deathAnim > 0) {
    const t = en.deathAnim / 16;
    ctx.globalAlpha = 1 - t;
    ctx.translate(ex+15, ey); ctx.scale(1+t*1.5, 1+t*1.5); ctx.translate(-(ex+15), -ey);
  }

  const wingY = Math.sin(wp) * 14;
  ctx.fillStyle = '#7a1a9a';
  ctx.beginPath(); ctx.moveTo(ex+12, ey+2); ctx.quadraticCurveTo(ex-6, ey-8-wingY, ex+0, ey+8); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(ex+12, ey+2); ctx.quadraticCurveTo(ex+2, ey-14-wingY, ex+6, ey+8); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(ex+18, ey+2); ctx.quadraticCurveTo(ex+36, ey-8-wingY, ex+30, ey+8); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(ex+18, ey+2); ctx.quadraticCurveTo(ex+28, ey-14-wingY, ex+24, ey+8); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#3a083a';
  ctx.beginPath(); ctx.ellipse(ex+15, ey+4, 10, 8, 0, 0, Math.PI*2); ctx.fill();
  const glowR = 0.6 + 0.4*Math.sin(frameCount*0.15);
  ctx.shadowColor = '#f00'; ctx.shadowBlur = 6 * glowR;
  ctx.fillStyle = `rgba(255,${Math.floor(glowR*50)},0,1)`;
  ctx.beginPath(); ctx.arc(ex+11, ey+2, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex+19, ey+2, 3, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex+12, ey+2, 1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex+20, ey+2, 1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#eee';
  ctx.fillRect(ex+12, ey+9, 3, 5); ctx.fillRect(ex+17, ey+9, 3, 5);
  ctx.restore();
}

// --- Ground ---
function drawGround() {
  const grad = ctx.createLinearGradient(0, GROUND, 0, GROUND+80);
  grad.addColorStop(0, '#5a9c3a'); grad.addColorStop(0.12, '#4a8030'); grad.addColorStop(1, '#3a5020');
  ctx.fillStyle = grad; ctx.fillRect(0, GROUND, 800, 80);
  ctx.fillStyle = '#6ab840'; ctx.fillRect(0, GROUND, 800, 6);
  ctx.strokeStyle = '#3a6020'; ctx.lineWidth = 1;
  for (let i = 0; i < 24; i++) {
    const gx = ((i*42 - groundOffset * 1.5) % 800 + 1600) % 800;
    ctx.beginPath(); ctx.moveTo(gx, GROUND+14); ctx.lineTo(gx+16, GROUND+14); ctx.stroke();
  }
}

// --- Background ---
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND);
  grad.addColorStop(0, '#080618'); grad.addColorStop(0.4, '#0d1b3e'); grad.addColorStop(0.75, '#1a3a6e'); grad.addColorStop(1, '#2a5090');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 800, GROUND);

  // Aurora bands
  ctx.save();
  const auroraColors = ['rgba(0,230,120,1)','rgba(100,0,255,1)','rgba(0,170,255,1)'];
  for (let a = 0; a < 3; a++) {
    const aY = 50 + a * 52;
    ctx.globalAlpha = 0.045 + 0.025 * Math.sin(frameCount * 0.007 + a * 2.1);
    const ag = ctx.createLinearGradient(0, aY - 22, 0, aY + 22);
    ag.addColorStop(0, 'transparent'); ag.addColorStop(0.5, auroraColors[a]); ag.addColorStop(1, 'transparent');
    ctx.fillStyle = ag;
    ctx.beginPath(); ctx.moveTo(0, aY);
    for (let x = 0; x <= 820; x += 40)
      ctx.lineTo(x, aY + Math.sin(x * 0.013 + frameCount * 0.011 + a * 1.3) * 20);
    ctx.lineTo(820, aY + 40); ctx.lineTo(0, aY + 40); ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // Stars
  const L0 = layers[0];
  for (const s of L0.objs) {
    const sx = ((s.x + L0.x) % 800 + 800) % 800;
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(frameCount * 0.04 + s.x); ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(sx, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Shooting star
  const ssCycle = frameCount % 320;
  if (ssCycle < 28) {
    const t = ssCycle / 28;
    const ssX = ((Math.floor(frameCount / 320) * 173) % 600) + 80;
    const ssY = 15 + ((Math.floor(frameCount / 320) * 97) % 70);
    ctx.save(); ctx.globalAlpha = Math.sin(t * Math.PI) * 0.9;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(ssX + t*130, ssY + t*45); ctx.lineTo(ssX + t*130 - 65, ssY + t*45 - 22); ctx.stroke();
    ctx.restore();
  }

  // Moon with glow
  ctx.save();
  ctx.shadowColor = '#ffffaa'; ctx.shadowBlur = 24;
  ctx.fillStyle = '#ffffcc'; ctx.beginPath(); ctx.arc(700, 50, 22, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0; ctx.restore();
  ctx.fillStyle = '#0d1b3e'; ctx.beginPath(); ctx.arc(710, 45, 18, 0, Math.PI*2); ctx.fill();

  const L1 = layers[1];
  for (const m of L1.objs) {
    const mx = ((m.x+L1.x) % 1200+1200) % 1200-150;
    ctx.fillStyle='#1e3460'; ctx.beginPath(); ctx.moveTo(mx,GROUND); ctx.lineTo(mx+m.w/2,GROUND-m.h); ctx.lineTo(mx+m.w,GROUND); ctx.fill();
    ctx.fillStyle='#c8d8f8'; ctx.beginPath();
    ctx.moveTo(mx+m.w/2,GROUND-m.h); ctx.lineTo(mx+m.w/2-m.w*0.12,GROUND-m.h*0.7); ctx.lineTo(mx+m.w/2+m.w*0.12,GROUND-m.h*0.7); ctx.closePath(); ctx.fill();
  }
  const L2 = layers[2];
  for (const t of L2.objs) {
    const tx = ((t.x+L2.x) % 1050+1050) % 1050-60;
    ctx.fillStyle='#2a4820'; ctx.fillRect(tx+9, GROUND-t.h*0.55, 6, t.h*0.55);
    ctx.fillStyle='#1a4020'; ctx.beginPath(); ctx.moveTo(tx,GROUND-t.h*0.5); ctx.lineTo(tx+12,GROUND-t.h); ctx.lineTo(tx+24,GROUND-t.h*0.5); ctx.fill();
    ctx.fillStyle='#234a28'; ctx.beginPath(); ctx.moveTo(tx+2,GROUND-t.h*0.36); ctx.lineTo(tx+12,GROUND-t.h*0.82); ctx.lineTo(tx+22,GROUND-t.h*0.36); ctx.fill();
  }
}

function drawSpeedLines() {
  ctx.save();
  for (let i = 0; i < 14; i++) {
    const ly=40+Math.random()*310, llen=50+Math.random()*110, lx=100+Math.random()*650;
    ctx.strokeStyle=`rgba(255,255,255,${0.04+Math.random()*0.1})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx-llen,ly); ctx.stroke();
  }
  ctx.restore();
}

function collidesBox(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y > b.y-b.h && a.y-a.h < b.y;
}

function axeBox() {
  return { x: player.x+10, y: player.y-player.h-24, w: 150, h: player.h+40 };
}

// --- Update (delta time) ---
function update(dt) {
  const f = dt * 60;
  frameCount++;
  elapsedMs = Math.max(0, performance.now() - playStartTime);

  if (keys['KeyA']) {
    boostSpeed = Math.min(boostSpeed + 0.096*f, baseSpeed + 4.8);
  } else {
    boostSpeed = Math.max(boostSpeed - 0.096*f, baseSpeed);
  }
  speed = boostSpeed;
  if (invincible) speed = Math.min(speed * 2.0, 36);

  // 10m/s固定（加速なし時）
  distance += speed / 7.2 * (10 / 60) * f;
  groundOffset += speed * f;

  layers[0].x -= speed * layers[0].spd * f;
  layers[1].x -= speed * layers[1].spd * f;
  layers[2].x -= speed * layers[2].spd * f;

  if (timeBonusDisplay > 0) timeBonusDisplay -= f;

  if (gameMode === 'timeattack' && distance >= TA_GOAL) {
    const t = elapsedMs;
    if (bestTime === null || t < bestTime) { bestTime = t; localStorage.setItem('axeRunnerBest', t); }
    stopBGM(); sndGoal();
    if (taRecords.length >= 50) { state = 'goal'; return; }
    showNameInput('timeattack'); return;
  }

  if (!player.onGround) {
    player.vy += (player.vy < 0 ? 0.79 : 0.42) * f;
    player.y += player.vy * f;
    if (player.y >= GROUND) { player.y = GROUND; player.vy = 0; player.onGround = true; player.jumping = false; }
  }

  player.animTimer += f;
  if (player.animTimer > Math.max(3, 7-Math.floor(speed*0.5))) { player.animTimer = 0; player.animFrame++; }

  if (player.chopping) {
    player.chopTimer += f;
    if (player.chopTimer >= player.chopDuration) { player.chopping = false; player.chopTimer = 0; }
  }

  spawnTimer += f;
  if (spawnTimer >= nextSpawnIn) {
    spawnTimer = 0; spawnObstacle();
    nextSpawnIn = randomInterval(spawnBaseInterval, Math.round(spawnBaseInterval * 0.8), 40);
  }

  if (distance >= nextMushroomDist) {
    nextMushroomDist += 480 + Math.random()*40;
    spawnMushroom();
  }

  enemySpawnTimer += f;
  if (enemySpawnTimer >= enemyNextSpawnIn) {
    enemySpawnTimer = 0; spawnEnemy();
    enemyNextSpawnIn = randomInterval(enemySpawnBaseInterval, 80, 80);
  }

  gEnemySpawnTimer += f;
  if (gEnemySpawnTimer >= gEnemyNextSpawnIn) {
    gEnemySpawnTimer = 0; spawnGroundEnemy();
    gEnemyNextSpawnIn = randomInterval(gEnemySpawnBaseInterval, 80, 80);
  }

  if (invincible) {
    invincibleTimer = Math.max(0, invincibleEndTime - performance.now());
    if (invincibleTimer <= 0) { invincible = false; }
  }

  const ph = { x: player.x+2, y: player.y, w: player.w-2, h: player.h };
  const ax = axeBox();
  const chopActive = player.chopping && player.chopTimer > 2 && player.chopTimer < player.chopDuration - 1;

  for (let i = mushrooms.length - 1; i >= 0; i--) {
    const mu = mushrooms[i];
    mu.x -= speed * f;
    mu.bobPhase += 0.08 * f;
    if (mu.x + mu.w < -10) { mushrooms.splice(i, 1); continue; }
    if (collidesBox(ph, { x: mu.x, y: mu.y, w: mu.w, h: mu.h })) {
      mushrooms.splice(i, 1);
      invincible = true; invincibleEndTime = performance.now() + INVINCIBLE_DURATION_MS;
      spawnParticles(mu.x+mu.w/2, mu.y-mu.h/2, ['#c060ff','#ff88ff','#fff','#a020f0'], 16, 6);
      sndPickup();
    }
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    if (ob.breakAnim > 0) {
      ob.x -= speed * f; ob.breakAnim += f;
      if (ob.breakAnim > 14) obstacles.splice(i, 1);
      continue;
    }
    ob.x -= speed * f;
    if (ob.x + ob.w < -10) { obstacles.splice(i, 1); continue; }
    if (!ob.alive) continue;
    if (!collidesBox(ph, ob)) continue;

    if (chopActive && collidesBox(ax, ob) && ob.type === 'crate') {
      ob.alive = false; ob.breakAnim = 1;
      spawnParticles(ob.x+ob.w/2, ob.y-ob.h/2, ['#9B7220','#c8a030','#ffee88','#fff'], 16);
      sndBreak(); continue;
    }

    const obTop = ob.y - ob.h;
    const prevBottom = player.y - player.vy * f;
    const landMargin = Math.abs(player.vy) * f + 6;
    if (player.vy >= 0 && prevBottom <= obTop + landMargin) {
      deathReason = 'CRUSHED!';
    } else {
      if (ob.type === 'crate') deathReason = 'SMASHED BY CRATE';
      else deathReason = ob.large ? 'SMASHED BY BOULDER' : 'SMASHED BY ROCK';
    }
    if (!invincible) {
      stopBGM(); sndGameOver();
      if (gameMode === 'normal') {
        if (bestDistance === null || Math.floor(distance) > bestDistance) {
          bestDistance = Math.floor(distance); localStorage.setItem('axeRunnerBestDist', bestDistance); isNewBest = true;
        } else { isNewBest = false; }
      }
      if (gameMode === 'hard') {
        if (bestHardDistance === null || Math.floor(distance) > bestHardDistance) {
          bestHardDistance = Math.floor(distance); localStorage.setItem('axeRunnerHardBestDist', bestHardDistance); isNewBest = true;
        } else { isNewBest = false; }
      }
      state = 'over'; return;
    }
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const en = enemies[i];
    if (en.deathAnim > 0) {
      en.x -= speed * 0.2 * f; en.deathAnim += f;
      if (en.deathAnim > 16) enemies.splice(i, 1);
      continue;
    }
    en.x -= (speed * en.speed + 1.68) * f;
    en.phase += en.freq * f;
    en.screenY = en.yCenter + Math.sin(en.phase) * en.amp;
    en.wingPhase += 0.32 * f;
    if (en.x + en.w < -10) { enemies.splice(i, 1); continue; }

    const eb = { x: en.x+8, y: en.screenY+14, w: 36, h: 32 };
    const ebPlayer = { x: en.x+19, y: en.screenY+20, w: 12, h: 10 };

    if (chopActive && collidesBox(ax, eb)) {
      en.alive = false; en.deathAnim = 1;
      spawnParticles(en.x+15, en.screenY, ['#f44','#fa8','#ff4','#fff','#c0f'], 18, 9);
      sndKill();
      if (gameMode === 'timeattack') { playStartTime += 1000; timeBonusDisplay = 90; sndTimeBonus(); }
      else { baseSpeed = Math.min(baseSpeed + 0.2, 36); boostSpeed = Math.max(boostSpeed, baseSpeed); }
      continue;
    }
    if (collidesBox(ph, ebPlayer) && !invincible) {
      deathReason = 'SLAIN BY ENEMY';
      stopBGM(); sndGameOver();
      if (gameMode === 'normal') {
        if (bestDistance === null || Math.floor(distance) > bestDistance) {
          bestDistance = Math.floor(distance); localStorage.setItem('axeRunnerBestDist', bestDistance); isNewBest = true;
        } else { isNewBest = false; }
      }
      if (gameMode === 'hard') {
        if (bestHardDistance === null || Math.floor(distance) > bestHardDistance) {
          bestHardDistance = Math.floor(distance); localStorage.setItem('axeRunnerHardBestDist', bestHardDistance); isNewBest = true;
        } else { isNewBest = false; }
      }
      state = 'over'; return;
    }
  }

  for (let i = groundEnemies.length - 1; i >= 0; i--) {
    const ge = groundEnemies[i];
    if (ge.deathAnim > 0) {
      ge.x -= speed * 0.2 * f; ge.deathAnim += f;
      if (ge.deathAnim > 16) groundEnemies.splice(i, 1);
      continue;
    }
    ge.x -= speed * ge.speed * f;
    ge.animTimer += f;
    if (ge.animTimer > 5) { ge.animTimer = 0; ge.animFrame++; }
    if (ge.x + ge.w < -10) { groundEnemies.splice(i, 1); continue; }

    if (chopActive && collidesBox(ax, { x: ge.x+4, y: ge.y-ge.h, w: ge.w-8, h: ge.h })) {
      ge.alive = false; ge.deathAnim = 1;
      spawnParticles(ge.x+18, ge.y-ge.h/2, ['#4f0','#8f4','#fff','#af8'], 14, 8);
      sndKill();
      if (gameMode === 'timeattack') { playStartTime += 1000; timeBonusDisplay = 90; sndTimeBonus(); }
      else { baseSpeed = Math.min(baseSpeed + 0.2, 36); boostSpeed = Math.max(boostSpeed, baseSpeed); }
      continue;
    }

    const geTop = ge.y - ge.h;
    if (player.vy > 0 && (player.y - player.vy*f) <= geTop + 8 &&
        player.y >= geTop - 4 &&
        player.x + player.w > ge.x + 6 && player.x < ge.x + ge.w - 6) {
      ge.alive = false; ge.deathAnim = 1;
      player.vy = JUMP_VY * 0.6; player.onGround = false; player.jumping = true;
      spawnParticles(ge.x+18, geTop, ['#4f0','#8f4','#fff','#af8'], 14, 8);
      sndStomp();
      if (gameMode === 'timeattack') { playStartTime += 1000; timeBonusDisplay = 90; sndTimeBonus(); }
      else { baseSpeed = Math.min(baseSpeed + 0.2, 36); boostSpeed = Math.max(boostSpeed, baseSpeed); }
      continue;
    }

    if (collidesBox(ph, { x: ge.x+10, y: ge.y, w: 16, h: ge.h }) && !invincible) {
      deathReason = 'SLAIN BY GOBLIN';
      stopBGM(); sndGameOver();
      if (gameMode === 'normal') {
        if (bestDistance === null || Math.floor(distance) > bestDistance) {
          bestDistance = Math.floor(distance); localStorage.setItem('axeRunnerBestDist', bestDistance); isNewBest = true;
        } else { isNewBest = false; }
      }
      if (gameMode === 'hard') {
        if (bestHardDistance === null || Math.floor(distance) > bestHardDistance) {
          bestHardDistance = Math.floor(distance); localStorage.setItem('axeRunnerHardBestDist', bestHardDistance); isNewBest = true;
        } else { isNewBest = false; }
      }
      state = 'over'; return;
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * f; p.y += p.vy * f; p.vy += 0.28 * f; p.rot += p.rotV * f; p.life -= f;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// --- Draw game scene ---
function draw() {
  ctx.clearRect(0, 0, 800, 400);
  drawBg();
  if (keys['KeyA']) drawSpeedLines();
  drawGround();

  for (const ob of obstacles) ob.type === 'crate' ? drawCrate(ob) : drawStone(ob);
  for (const en of enemies) drawEnemy(en);
  for (const ge of groundEnemies) drawGroundEnemy(ge);
  for (const mu of mushrooms) drawMushroom(mu);

  // Goal post for time attack (43.2 px per meter)
  if (gameMode === 'timeattack') {
    const goalX = Math.round(player.x + (TA_GOAL - distance) * 43.2);
    if (goalX > -10 && goalX < 900) {
      const gw = 64;
      // Glow when very close
      if (distance > 940) {
        ctx.save(); ctx.globalAlpha = ((distance-940)/60) * 0.28 * (0.8+0.2*Math.sin(frameCount*0.18));
        ctx.fillStyle = '#fa4'; ctx.fillRect(0,0,800,400); ctx.restore();
      }
      // Posts
      ctx.save();
      ctx.shadowColor = '#fa4'; ctx.shadowBlur = 10;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(goalX, GROUND); ctx.lineTo(goalX, GROUND-185); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(goalX+gw, GROUND); ctx.lineTo(goalX+gw, GROUND-185); ctx.stroke();
      ctx.shadowBlur = 0;
      // Banner
      ctx.fillStyle = '#fa4'; ctx.fillRect(goalX, GROUND-185, gw, 18);
      ctx.fillStyle = '#000'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
      ctx.fillText('GOAL', goalX+gw/2, GROUND-172);
      ctx.textAlign = 'left';
      // Checkered tape
      for (let i = 0; i < 8; i++) {
        ctx.fillStyle = (i%2===0) ? '#fff' : '#000';
        ctx.fillRect(goalX + i*(gw/8), GROUND-167, gw/8, 10);
      }
      // Horizontal bar
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(goalX, GROUND-185); ctx.lineTo(goalX+gw, GROUND-185); ctx.stroke();
      ctx.restore();
    }
  }

  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = p.life/p.maxLife;
    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    ctx.restore();
  }

  if (invincible) {
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.2*Math.sin(frameCount*0.2);
    ctx.fillStyle = '#c060ff';
    ctx.beginPath(); ctx.ellipse(player.x+16, player.y-player.h/2, 28, 34, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  if (!invincible || Math.floor(frameCount/4) % 2 === 0) drawPlayer();

  ctx.fillStyle = 'rgba(0,0,0,0.58)'; ctx.fillRect(0, 0, 800, 38);

  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace';
  ctx.fillText(`${Math.floor(distance)}m`, 14, 25);

  if (gameMode === 'timeattack') {
    const pct = Math.min(distance/TA_GOAL, 1);
    ctx.fillStyle = '#333'; ctx.fillRect(0, 32, 800, 6);
    ctx.fillStyle = '#4fa'; ctx.fillRect(0, 32, 800*pct, 6);
    ctx.fillStyle = '#4fa'; ctx.font = 'bold 16px monospace';
    ctx.fillText(`TIME ${formatTime(elapsedMs)}`, 270, 24);
    if (bestTime !== null) { ctx.fillStyle = '#fa4'; ctx.fillText(`BEST ${formatTime(bestTime)}`, 510, 24); }
    if (timeBonusDisplay > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, timeBonusDisplay / 20);
      ctx.fillStyle = '#4fa'; ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center';
      ctx.fillText('-1s ★', 400, 60);
      ctx.textAlign = 'left';
      ctx.restore();
    }
  } else if (gameMode === 'hard') {
    if (bestHardDistance !== null) { ctx.fillStyle = '#fa4'; ctx.font = 'bold 14px monospace'; ctx.fillText(`BEST: ${bestHardDistance}m`, 510, 25); }
  } else {
    if (bestDistance !== null) { ctx.fillStyle = '#fa4'; ctx.font = 'bold 14px monospace'; ctx.fillText(`BEST: ${bestDistance}m`, 510, 25); }
  }
  // Mode label top-right
  { const modeLabel = gameMode === 'timeattack' ? 'T.ATTACK' : gameMode.toUpperCase();
    const modeColor = gameMode === 'normal' ? '#4af' : gameMode === 'hard' ? '#f84' : '#fa4';
    ctx.fillStyle = modeColor; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'right';
    ctx.fillText(modeLabel, 792, 25); ctx.textAlign = 'left'; }

  if (invincible) {
    ctx.fillStyle = `rgba(192,96,255,${0.8+0.2*Math.sin(frameCount*0.15)})`;
    ctx.font = 'bold 15px monospace';
    const sec = Math.ceil(invincibleTimer/1000);
    ctx.fillText(`★INVINCIBLE ${sec}s`, 390, 25);
  }
  if (keys['KeyA']) {
    ctx.save(); ctx.globalAlpha = 0.1; ctx.fillStyle='#ff0'; ctx.fillRect(0,0,800,400); ctx.restore();
  }

  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(6, 44, 120, 48);
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = keys['KeyA'] ? '#ff4' : '#555';
  ctx.fillText('▶ BOOST', 14, 62);
  ctx.fillStyle = player.chopping ? '#f84' : '#555';
  ctx.fillText('🔨 SMASH', 14, 83);

  ctx.fillStyle = 'rgba(0,0,0,0.58)'; ctx.fillRect(0, 384, 800, 16);
  ctx.fillStyle = '#aaa'; ctx.font = '11px monospace';
  ctx.fillText('[Enter] ジャンプ   [A] ブースト   [S] ハンマー — 石はジャンプ！木箱はS！敵はジャンプかS！', 8, 395);
}

// --- Demo background ---
const demo = {
  spd: 7.2, fc: 0, gOff: 0,
  layers: [
    { x: 0, spd: 0.2, objs: genStars(40) },
    { x: 0, spd: 0.5, objs: genMountains() },
    { x: 0, spd: 1.0, objs: genTrees() },
  ],
  obs: [], ens: [], mus: [],
  spawnT: 0, spawnNext: 80,
  enSpawnT: 0, enSpawnNext: 200,
  muSpawnT: 0, muSpawnNext: 400,
  playerY: GROUND, playerVy: 0, playerOnGround: true,
  animF: 0, animT: 0,
};

function updateDemo() {
  const f = 1;
  demo.fc++;
  demo.gOff += demo.spd * f;
  demo.layers[0].x -= demo.spd * demo.layers[0].spd * f;
  demo.layers[1].x -= demo.spd * demo.layers[1].spd * f;
  demo.layers[2].x -= demo.spd * demo.layers[2].spd * f;

  const nearest = demo.obs.find(o => o.alive && o.x < 220 && o.x > 80);
  if (nearest && demo.playerOnGround) {
    demo.playerVy = JUMP_VY; demo.playerOnGround = false;
  }
  if (!demo.playerOnGround) {
    demo.playerVy += (demo.playerVy < 0 ? 0.79 : 0.42) * f;
    demo.playerY += demo.playerVy * f;
    if (demo.playerY >= GROUND) { demo.playerY = GROUND; demo.playerVy = 0; demo.playerOnGround = true; }
  }
  demo.animT += f;
  if (demo.animT > 6) { demo.animT = 0; demo.animF++; }

  demo.spawnT += f;
  if (demo.spawnT >= demo.spawnNext) {
    demo.spawnT = 0; demo.spawnNext = 70 + Math.floor(Math.random()*60);
    const large = Math.random() < 0.6;
    demo.obs.push({ type:'stone', x:820, w:large?52:36, h:large?46:24, y:GROUND, large, alive:true });
  }
  demo.enSpawnT += f;
  if (demo.enSpawnT >= demo.enSpawnNext) {
    demo.enSpawnT = 0; demo.enSpawnNext = 180 + Math.floor(Math.random()*120);
    demo.ens.push({ x:830, yCenter:155+Math.random()*100, amp:30+Math.random()*40,
      freq:0.03+Math.random()*0.02, phase:Math.random()*Math.PI*2, screenY:200,
      wingPhase:0, speed:1.2+Math.random()*0.3, alive:true, deathAnim:0 });
  }
  demo.muSpawnT += f;
  if (demo.muSpawnT >= demo.muSpawnNext) {
    demo.muSpawnT = 0; demo.muSpawnNext = 350 + Math.floor(Math.random()*100);
    demo.mus.push({ x:870, y:GROUND, w:28, h:36, bobPhase:Math.random()*Math.PI*2 });
  }

  for (let i = demo.obs.length-1; i>=0; i--) {
    demo.obs[i].x -= demo.spd * f;
    if (demo.obs[i].x + demo.obs[i].w < -10) demo.obs.splice(i,1);
  }
  for (let i = demo.ens.length-1; i>=0; i--) {
    const en = demo.ens[i];
    en.x -= (demo.spd * en.speed + 1.68) * f;
    en.phase += en.freq * f; en.screenY = en.yCenter + Math.sin(en.phase)*en.amp;
    en.wingPhase += 0.32 * f;
    if (en.x + 52 < -10) demo.ens.splice(i,1);
  }
  for (let i = demo.mus.length-1; i>=0; i--) {
    demo.mus[i].x -= demo.spd * f; demo.mus[i].bobPhase += 0.08 * f;
    if (demo.mus[i].x + 28 < -10) demo.mus.splice(i,1);
  }
}

function drawDemoBg() {
  const grad = ctx.createLinearGradient(0,0,0,GROUND);
  grad.addColorStop(0,'#080618'); grad.addColorStop(0.4,'#0d1b3e'); grad.addColorStop(0.75,'#1a3a6e'); grad.addColorStop(1,'#2a5090');
  ctx.fillStyle=grad; ctx.fillRect(0,0,800,GROUND);
  // Aurora bands
  ctx.save();
  const auroraColors=['rgba(0,230,120,1)','rgba(100,0,255,1)','rgba(0,170,255,1)'];
  for (let a=0;a<3;a++) {
    const aY=50+a*52;
    ctx.globalAlpha=0.045+0.025*Math.sin(demo.fc*0.007+a*2.1);
    const ag=ctx.createLinearGradient(0,aY-22,0,aY+22);
    ag.addColorStop(0,'transparent'); ag.addColorStop(0.5,auroraColors[a]); ag.addColorStop(1,'transparent');
    ctx.fillStyle=ag;
    ctx.beginPath(); ctx.moveTo(0,aY);
    for (let x=0;x<=820;x+=40) ctx.lineTo(x,aY+Math.sin(x*0.013+demo.fc*0.011+a*1.3)*20);
    ctx.lineTo(820,aY+40); ctx.lineTo(0,aY+40); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  const L0=demo.layers[0];
  for (const s of L0.objs) {
    const sx=((s.x+L0.x)%800+800)%800;
    ctx.globalAlpha=0.5+0.5*Math.sin(demo.fc*0.04+s.x); ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(sx,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // Shooting star
  const ssCycle=demo.fc%320;
  if(ssCycle<28){const t=ssCycle/28;ctx.save();ctx.globalAlpha=Math.sin(t*Math.PI)*0.9;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(180+t*130,20+t*45);ctx.lineTo(180+t*130-65,20+t*45-22);ctx.stroke();ctx.restore();}
  ctx.save(); ctx.shadowColor='#ffffaa'; ctx.shadowBlur=24;
  ctx.fillStyle='#ffffcc'; ctx.beginPath(); ctx.arc(700,50,22,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
  ctx.fillStyle='#0d1b3e'; ctx.beginPath(); ctx.arc(710,45,18,0,Math.PI*2); ctx.fill();
  const L1=demo.layers[1];
  for (const m of L1.objs) {
    const mx=((m.x+L1.x)%1200+1200)%1200-150;
    ctx.fillStyle='#1e3460'; ctx.beginPath(); ctx.moveTo(mx,GROUND); ctx.lineTo(mx+m.w/2,GROUND-m.h); ctx.lineTo(mx+m.w,GROUND); ctx.fill();
    ctx.fillStyle='#c8d8f8'; ctx.beginPath();
    ctx.moveTo(mx+m.w/2,GROUND-m.h); ctx.lineTo(mx+m.w/2-m.w*0.12,GROUND-m.h*0.7); ctx.lineTo(mx+m.w/2+m.w*0.12,GROUND-m.h*0.7); ctx.closePath(); ctx.fill();
  }
  const L2=demo.layers[2];
  for (const t of L2.objs) {
    const tx=((t.x+L2.x)%1050+1050)%1050-60;
    ctx.fillStyle='#2a4820'; ctx.fillRect(tx+9,GROUND-t.h*0.55,6,t.h*0.55);
    ctx.fillStyle='#1a4020'; ctx.beginPath(); ctx.moveTo(tx,GROUND-t.h*0.5); ctx.lineTo(tx+12,GROUND-t.h); ctx.lineTo(tx+24,GROUND-t.h*0.5); ctx.fill();
    ctx.fillStyle='#234a28'; ctx.beginPath(); ctx.moveTo(tx+2,GROUND-t.h*0.36); ctx.lineTo(tx+12,GROUND-t.h*0.82); ctx.lineTo(tx+22,GROUND-t.h*0.36); ctx.fill();
  }
  const ggrad=ctx.createLinearGradient(0,GROUND,0,GROUND+80);
  ggrad.addColorStop(0,'#5a9c3a'); ggrad.addColorStop(0.12,'#4a8030'); ggrad.addColorStop(1,'#3a5020');
  ctx.fillStyle=ggrad; ctx.fillRect(0,GROUND,800,80);
  ctx.fillStyle='#6ab840'; ctx.fillRect(0,GROUND,800,6);
  ctx.strokeStyle='#3a6020'; ctx.lineWidth=1;
  for (let i=0;i<24;i++) {
    const gx=((i*42-demo.gOff*1.5)%800+1600)%800;
    ctx.beginPath(); ctx.moveTo(gx,GROUND+14); ctx.lineTo(gx+16,GROUND+14); ctx.stroke();
  }
  for (const ob of demo.obs) ob.type==='crate' ? drawCrate(ob) : drawStone(ob);
  for (const en of demo.ens) { drawEnemy(en); }
  for (const mu of demo.mus) drawMushroom(mu);
  const savedPlayer = {...player};
  player.x=110; player.y=demo.playerY; player.h=PLAYER_H;
  player.animFrame=demo.animF; player.jumping=!demo.playerOnGround; player.chopping=false;
  drawPlayer();
  Object.assign(player, savedPlayer);
}

  ctx.fillStyle='#8cf'; ctx.font='10px monospace';
  ctx.fillText('敵撃破→-1s', cx2, PY+74);
  if (bestTime!==null) { ctx.fillStyle='#fa4'; ctx.font='10px monospace'; ctx.fillText(`BEST: ${formatTime(bestTime)}`, cx2, PY+88); }

  ctx.fillStyle='#888'; ctx.font='12px monospace'; ctx.textAlign='center';
  ctx.fillText('[Enter] ジャンプ   [A] ブースト   [S] ハンマーを振る   [Esc] ホームへ', 400, 275);
  ctx.fillText('石 → ジャンプで飛び越える（ハンマーでは壊せない）', 400, 293);
  ctx.fillText('木箱 → [S] で破壊できる', 400, 309);
  ctx.fillText('空飛ぶ敵 → ジャンプか [S] で撃破', 400, 325);
  ctx.fillText('歩く敵 → 踏みつけか [S] で撃破', 400, 341);
  ctx.fillText('キノコ → 取ると3秒間無敵 ＋ 2倍速', 400, 357);

  ctx.fillStyle='#445'; ctx.font='11px monospace'; ctx.textAlign='right';
  ctx.fillText('Ver. 2.3', 792, 392);
  if (swordMode) {
    ctx.fillStyle='#88aaff'; ctx.font='bold 11px monospace';
    ctx.fillText('⚔ SWORD MODE', 792, 378);
  }

  ctx.fillStyle = '#4af'; ctx.strokeStyle = '#4af'; ctx.lineWidth=1;
  ctx.strokeRect(8, 8, 100, 28);
  ctx.font='13px monospace'; ctx.textAlign='center';
  ctx.fillText('記録 [R]', 58, 27);

  ctx.textAlign='left';
}

// --- Game over ---
function drawOver() {
  draw();
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,800,400);
  const isEndless = gameMode==='normal' || gameMode==='hard';
  const panH = gameMode==='timeattack' ? 260 : 270;
  ctx.fillStyle='#1a0a0a'; ctx.strokeStyle='#f44'; ctx.lineWidth=3;
  ctx.fillRect(155,65,490,panH); ctx.strokeRect(155,65,490,panH);

  ctx.fillStyle='#f44'; ctx.font='bold 40px monospace'; ctx.textAlign='center';
  ctx.fillText('GAME OVER', 400, 122);
  ctx.fillStyle='#fa8'; ctx.font='bold 16px monospace';
  ctx.fillText(deathReason, 400, 150);
  ctx.fillStyle='#fff'; ctx.font='22px monospace';
  ctx.fillText(`${Math.floor(distance)}m`, 400, 192);
  ctx.fillStyle='#aaa'; ctx.font='13px monospace'; ctx.fillText('Distance', 400, 212);

  if (gameMode==='normal' && bestDistance !== null) {
    const isNew = Math.floor(distance) >= bestDistance;
    ctx.fillStyle='#fa4'; ctx.font=(isNew?'bold ':'')+'14px monospace';
    ctx.fillText(isNew ? `★ NEW BEST! ${bestDistance}m ★` : `BEST: ${bestDistance}m`, 400, 234);
  }
  if (gameMode==='hard' && bestHardDistance !== null) {
    const isNew = Math.floor(distance) >= bestHardDistance;
    ctx.fillStyle='#f84'; ctx.font=(isNew?'bold ':'')+'14px monospace';
    ctx.fillText(isNew ? `★ NEW BEST! ${bestHardDistance}m ★` : `BEST: ${bestHardDistance}m`, 400, 234);
  }
  if (gameMode==='timeattack') {
    ctx.fillStyle='#8cf'; ctx.font='17px monospace';
    ctx.fillText(`Time: ${formatTime(elapsedMs)}`, 400, 248);
    ctx.fillStyle='#4af'; ctx.font='14px monospace';
    ctx.fillText('[Enter] Retry   [Esc] Home', 400, 298);
  } else {
    const curListFull = (gameMode === 'hard' ? hardRecords : normalRecords).length >= 50;
    if (!recordDecided) {
      if (curListFull) {
        ctx.fillStyle='#f44'; ctx.font='bold 13px monospace';
        ctx.fillText('記録上限(50件)に達しています', 400, 252);
        ctx.fillStyle='#555'; ctx.font='12px monospace';
        ctx.fillText('管理者モードで削除してください', 400, 272);
        ctx.fillStyle='#4af'; ctx.font='14px monospace';
        ctx.fillText('[Enter] Retry   [Esc] Home', 400, 308);
        if (!recordDecided) recordDecided = true;
      } else if (isNewBest) {
        // NEW BEST: [Y]のみ、必ず記録
        ctx.fillStyle='#ff4'; ctx.font='bold 13px monospace';
        ctx.fillText('★ NEW BEST! 記録してください', 400, 244);
        ctx.fillStyle='#4fa'; ctx.strokeStyle='#4fa'; ctx.lineWidth=2;
        ctx.strokeRect(300, 252, 200, 34); ctx.fillStyle='rgba(0,60,30,0.8)'; ctx.fillRect(300,252,200,34);
        ctx.fillStyle='#4fa'; ctx.font='bold 15px monospace';
        ctx.fillText('[Y] 記録する', 400, 274);
        ctx.fillStyle='#444'; ctx.font='13px monospace';
        ctx.fillText('[Esc] Home', 400, 308);
      } else {
        ctx.fillStyle='#4fa'; ctx.strokeStyle='#4fa'; ctx.lineWidth=1;
        ctx.strokeRect(192, 248, 140, 32); ctx.fillStyle='rgba(0,50,30,0.7)'; ctx.fillRect(192,248,140,32);
        ctx.fillStyle='#4fa'; ctx.font='bold 14px monospace';
        ctx.fillText('[Y] 記録する', 262, 269);
        ctx.fillStyle='#f84'; ctx.strokeStyle='#f84'; ctx.lineWidth=1;
        ctx.strokeRect(352, 248, 140, 32); ctx.fillStyle='rgba(50,20,0,0.7)'; ctx.fillRect(352,248,140,32);
        ctx.fillStyle='#f84'; ctx.font='bold 14px monospace';
        ctx.fillText('[N] スキップ', 422, 269);
        ctx.fillStyle='#444'; ctx.font='13px monospace';
        ctx.fillText('[Enter] Retry   [Esc] Home', 400, 308);
      }
    } else {
      ctx.fillStyle='#f84'; ctx.font='13px monospace';
      ctx.fillText('スキップしました', 400, 262);
      ctx.fillStyle='#4af'; ctx.font='14px monospace';
      ctx.fillText('[Enter] Retry   [Esc] Home', 400, 300);
    }
  }
  ctx.textAlign='left';
}

// --- Goal screen ---
function drawGoal() {
  draw();
  ctx.fillStyle='rgba(0,0,0,0.70)'; ctx.fillRect(0,0,800,400);
  ctx.save(); ctx.globalAlpha=0.13+0.08*Math.sin(frameCount*0.1); ctx.fillStyle='#4fa'; ctx.fillRect(0,0,800,400); ctx.restore();

  ctx.fillStyle='#1a2a1a'; ctx.strokeStyle='#4fa'; ctx.lineWidth=3;
  ctx.fillRect(145,68,510,265); ctx.strokeRect(145,68,510,265);

  ctx.fillStyle='#4fa'; ctx.font='bold 50px monospace'; ctx.textAlign='center';
  ctx.fillText('GOAL!', 400, 140);
  ctx.fillStyle='#fff'; ctx.font='bold 28px monospace';
  ctx.fillText(formatTime(elapsedMs), 400, 188);
  ctx.fillStyle='#aaa'; ctx.font='13px monospace'; ctx.fillText('Clear Time', 400, 210);

  if (bestTime!==null && elapsedMs<=bestTime) {
    ctx.fillStyle='#fa4'; ctx.font='bold 20px monospace'; ctx.fillText('★ NEW BEST! ★', 400, 248);
  } else if (bestTime!==null) {
    ctx.fillStyle='#fa4'; ctx.font='15px monospace'; ctx.fillText(`BEST: ${formatTime(bestTime)}`, 400, 248);
  }
  ctx.fillStyle='#4af'; ctx.font='14px monospace';
  ctx.fillText('[Enter] Retry   [Esc] Home', 400, 302);
  ctx.textAlign='left';
}

// --- Records screen (3 columns) ---
function drawRecordColumn(title, list, cx, valueFn, color, colIdx) {
  const isActiveCol = recCol === colIdx;
  const maxShow = adminMode ? 50 : 10;
  const rowH = adminMode ? 7 : 28;
  const startY = adminMode ? 58 : 64;
  const fSize = adminMode ? 9 : 12;

  ctx.fillStyle = isActiveCol ? '#fff' : color;
  ctx.font = isActiveCol ? 'bold 15px monospace' : 'bold 14px monospace';
  ctx.textAlign='center';
  ctx.fillText(title, cx, 42);
  ctx.strokeStyle = color; ctx.lineWidth = isActiveCol ? 2 : 1;
  ctx.beginPath(); ctx.moveTo(cx-110, 50); ctx.lineTo(cx+110, 50); ctx.stroke();

  if (list.length === 0) {
    ctx.fillStyle='#555'; ctx.font='12px monospace'; ctx.fillText('記録なし', cx, 190);
  } else {
    list.slice(0, maxShow).forEach((r, i) => {
      const y = startY + i * rowH;
      const isSel = isActiveCol && i === recRow;
      if (isSel) {
        ctx.fillStyle = 'rgba(255,255,255,0.14)';
        ctx.fillRect(cx-112, y-rowH*0.65, 222, rowH);
        ctx.strokeStyle = color; ctx.lineWidth=1;
        ctx.strokeRect(cx-112, y-rowH*0.65, 222, rowH);
      }
      const rankColor = isSel ? '#fff' : (i===0 ? '#fa4' : i===1 ? '#bbb' : i===2 ? '#c84' : i < 10 ? '#778' : '#556');
      ctx.fillStyle = rankColor;
      ctx.font = (isSel ? 'bold ' : '') + `${fSize}px monospace`;
      ctx.textAlign='right'; ctx.fillText(`${i+1}.`, cx-90, y);
      ctx.textAlign='left';  ctx.fillText(r.name.slice(0, adminMode?8:10), cx-82, y);
      ctx.textAlign='right'; ctx.fillText(valueFn(r), cx+108, y);
    });
    if (!adminMode && list.length > 10) {
      ctx.fillStyle='#445'; ctx.font='10px monospace'; ctx.textAlign='center';
      ctx.fillText(`+${list.length - 10}件 (管理者モードで表示)`, cx, startY + 10*rowH + 4);
    }
  }
}

function drawRecords() {
  const g = ctx.createLinearGradient(0,0,0,400);
  g.addColorStop(0,'#0d1b3e'); g.addColorStop(1,'#1a3a6e');
  ctx.fillStyle=g; ctx.fillRect(0,0,800,400);

  // 縦区切り
  ctx.strokeStyle='#334'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(267,10); ctx.lineTo(267,385); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(533,10); ctx.lineTo(533,385); ctx.stroke();

  drawRecordColumn('NORMAL',      normalRecords, 133, r=>`${r.dist}m`,     '#4fa', 0);
  drawRecordColumn('HARD',        hardRecords,   400, r=>`${r.dist}m`,     '#f84', 1);
  drawRecordColumn('TIME ATTACK', taRecords,     667, r=>formatTime(r.ms), '#4af', 2);

  if (adminMode) {
    ctx.fillStyle='rgba(255,80,0,0.18)'; ctx.fillRect(0,0,800,400);
    ctx.fillStyle='#f84'; ctx.font='bold 11px monospace'; ctx.textAlign='right';
    ctx.fillText('ADMIN MODE  [A] 終了', 795, 14);
    ctx.fillStyle='#555'; ctx.font='11px monospace'; ctx.textAlign='center';
    ctx.fillText('← → 列選択   ↑ ↓ 行選択   [Del] 削除   [E] 名前変更   [A] 終了   [Esc] 戻る', 400, 396);
  } else {
    ctx.fillStyle='#444'; ctx.font='11px monospace'; ctx.textAlign='center';
    ctx.fillText('← → 列選択   ↑ ↓ 行選択   [A] 管理者モード   [Esc] 戻る', 400, 396);
  }
  ctx.textAlign='left';
}

// --- Main loop ---
function loop(timestamp) {
  const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 1/60;
  lastTime = timestamp;

  if (state==='modeSel') { drawModeSelect(); }
  else if (state==='play') { update(dt); draw(); }
  else if (state==='over') { drawOver(); }
  else if (state==='goal') { frameCount++; drawGoal(); }
  else if (state==='nameinput') { frameCount++; if (pendingRecordMode === 'rename') drawRecords(); else drawGoal(); }
  else if (state==='records') { drawRecords(); }
  prevKeys={...keys};
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
